# Documentação
#
###############################################################################
#
# Camadas de Segurança
#
#                    Internet
#                        │
#                 Network ACL
#                        │
#                 Security Group
#                        │
#                   Amazon EC2
#
# A Network ACL protege a subnet.
#
# O Security Group protege a instância.
#
###############################################################################
#
# Portas Permitidas
#
# TCP 22  → SSH
#
# TCP 80  → HTTP
#
# TCP 443 → HTTPS
#
# ICMP    → Ping (Opcional)
#
###############################################################################
#
# Recursos Provisionados nesta Parte
#
# ✔ Security Group
# ✔ Regra SSH
# ✔ Regra HTTP
# ✔ Regra HTTPS
# ✔ Regra ICMP
# ✔ Self Reference
# ✔ IPv6 HTTP
# ✔ IPv6 HTTPS
#
###############################################################################
#
# Boas Práticas Implementadas
#
# ✔ Stateful Firewall.
# ✔ Regras condicionais.
# ✔ Comunicação interna controlada.
# ✔ Compatibilidade IPv4 e IPv6.
# ✔ Tags padronizadas.
# ✔ Menor privilégio.
# ✔ Estrutura pronta para ALB e Auto Scaling.
