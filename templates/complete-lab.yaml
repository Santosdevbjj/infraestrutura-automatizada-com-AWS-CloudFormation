# Amazon EC2
#
###############################################################################

  EC2InstanceId:

    Description: Instance ID.

    Value:

      !Ref EC2Instance

    Export:

      Name:

        !Sub "${AWS::StackName}-EC2"

###############################################################################
#
# Public IP
#
###############################################################################

  PublicIPAddress:

    Description: IP público da EC2.

    Value:

      !GetAtt EC2Instance.PublicIp

###############################################################################
#
# Elastic IP
#
###############################################################################

  ElasticIPAddress:

    Condition: CreateElasticIP

    Description: Elastic IP da infraestrutura.

    Value:

      !Ref ElasticIP

###############################################################################
#
# CloudWatch Dashboard
#
###############################################################################

  DashboardName:

    Description: Dashboard do CloudWatch.

    Value:

      !Ref MonitoringDashboard

###############################################################################
#
# CloudWatch Log Group
#
###############################################################################

  CloudWatchLogs:

    Description: Grupo de Logs.

    Value:

      !Ref CloudWatchLogGroup

###############################################################################
#
# SNS Topic
#
###############################################################################

  MonitoringTopicArn:

    Description: ARN do tópico SNS.

    Value:

      !Ref MonitoringTopic

###############################################################################
#
# Stack
#
###############################################################################

  StackId:

    Description: Stack ID.

    Value:

      !Ref AWS::StackId

###############################################################################
#
# Região
#
###############################################################################

  AWSRegion:

    Description: Região utilizada.

    Value:

      !Ref AWS::Region

###############################################################################
#
# Conta AWS
#
###############################################################################

  AWSAccount:

    Description: Conta AWS.

    Value:

      !Ref AWS::AccountId

