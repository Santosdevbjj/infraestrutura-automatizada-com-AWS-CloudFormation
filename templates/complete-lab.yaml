AWSTemplateFormatVersion: '2010-09-09'

Description: >
  ============================================================================
  AWS CloudFormation - Complete Lab (Single Stack)
  ----------------------------------------------------------------------------
  Projeto......: Infraestrutura Automatizada com AWS CloudFormation
  Repositório..: infraestrutura-automatizada-com-AWS-CloudFormation
  Template.....: templates/complete-lab.yaml
  Autor........: Sérgio Luiz dos Santos
  Arquitetura..: Single Stack (Monolítica)
  Objetivo.....: Provisionar uma infraestrutura completa utilizando um único
                 template CloudFormation, demonstrando boas práticas de
                 Infrastructure as Code (IaC), modularização lógica,
                 parametrização, governança e segurança.
  ============================================================================

Metadata:

  AWS::CloudFormation::Interface:

    ParameterGroups:

      - Label:
          default: "Informações Gerais"

        Parameters:

          - ProjectName
          - Environment
          - Owner

      - Label:
          default: "Rede"

        Parameters:

          - VPCCidr
          - PublicSubnet1CIDR
          - PublicSubnet2CIDR

      - Label:
          default: "Amazon EC2"

        Parameters:

          - InstanceType
          - KeyPairName

      - Label:
          default: "Segurança"

        Parameters:

          - SSHLocation
          - EnableHTTP
          - EnableHTTPS
          - EnableICMP

      - Label:
          default: "Amazon S3"

        Parameters:

          - BucketName
          - EnableVersioning
          - EnableEncryption

    ParameterLabels:

      ProjectName:
        default: Projeto

      Environment:
        default: Ambiente

      Owner:
        default: Responsável

      VPCCidr:
        default: CIDR da VPC

      PublicSubnet1CIDR:
        default: Subnet Pública 1

      PublicSubnet2CIDR:
        default: Subnet Pública 2

      InstanceType:
        default: Tipo da Instância

      KeyPairName:
        default: Chave SSH

      SSHLocation:
        default: Origem SSH

      EnableHTTP:
        default: Habilitar HTTP

      EnableHTTPS:
        default: Habilitar HTTPS

      EnableICMP:
        default: Habilitar ICMP

      BucketName:
        default: Nome do Bucket

      EnableVersioning:
        default: Versionamento

      EnableEncryption:
        default: Criptografia

###############################################################################
#
# Informações do Projeto
#
###############################################################################

  Project:

    Name: Infraestrutura Automatizada com AWS CloudFormation

    Repository: infraestrutura-automatizada-com-AWS-CloudFormation

    Template: templates/complete-lab.yaml

    Version: "1.0.0"

    Architecture: Single Stack

    IaC: AWS CloudFormation

    CloudProvider: AWS

    LastUpdate: "2026"

###############################################################################
#
# Objetivos do Laboratório
#
###############################################################################
#
# Este template demonstra:
#
# • Infrastructure as Code (IaC)
# • AWS CloudFormation
# • Provisionamento automatizado
# • Segurança em nuvem
# • Modularização lógica em um único template
# • Governança por parâmetros e tags
# • Recursos reutilizáveis
# • Ambientes Development, Homologation e Production
#
###############################################################################
#
# Arquitetura
#
#                    Internet
#                        │
#                 Internet Gateway
#                        │
#                    Route Table
#                        │
#         ┌──────────────┴──────────────┐
#         │                             │
#   Public Subnet 1              Public Subnet 2
#         │                             │
#         └──────────────┬──────────────┘
#                        │
#                 Security Group
#                        │
#              Amazon EC2 Instance
#                        │
#          ┌─────────────┴─────────────┐
#          │                           │
#      Elastic IP                IAM Role
#                                      │
#                                      ▼
#                                Amazon S3
#
###############################################################################
#
# Recursos que serão provisionados
#
# ✔ Amazon VPC
# ✔ Internet Gateway
# ✔ Route Table
# ✔ Public Subnet 1
# ✔ Public Subnet 2
# ✔ Network ACL
# ✔ Security Group
# ✔ IAM Role
# ✔ Instance Profile
# ✔ Amazon EC2
# ✔ Elastic IP
# ✔ Amazon S3
#
###############################################################################
#
# Estrutura do Template
#
# Parte 1  -> Cabeçalho, Metadata e Interface
# Parte 2  -> Parameters
# Parte 3  -> Mappings, Conditions e Rules
# Parte 4  -> Amazon VPC
# Parte 5  -> Subnets e Network ACL
# Parte 6  -> Security Group
# Parte 7  -> IAM
# Parte 8  -> Amazon S3
# Parte 9  -> Amazon EC2
# Parte 10 -> Outputs
# Parte 11 -> Documentação Técnica
# Parte 12 -> Roadmap e Encerramento
#
###############################################################################
#
# Convenções
#
# • Recursos nomeados com ProjectName.
# • Tags padronizadas para todos os recursos.
# • Comentários explicativos em cada seção.
# • Estrutura compatível com cfn-lint.
# • Alinhado ao AWS Well-Architected Framework.
#
###############################################################################

Parameters:



###############################################################################
#
# Informações Gerais
#
###############################################################################

  ProjectName:

    Type: String

    Default: AWS-CloudFormation-Lab

    MinLength: 3

    MaxLength: 50

    AllowedPattern: "^[a-zA-Z0-9-]+$"

    Description: Nome utilizado para identificar os recursos do projeto.

  Environment:

    Type: String

    Default: Development

    AllowedValues:

      - Development
      - Homologation
      - Production

    Description: Ambiente onde a infraestrutura será implantada.

  Owner:

    Type: String

    Default: Sergio Santos

    MinLength: 3

    MaxLength: 100

    Description: Responsável pela infraestrutura.

###############################################################################
#
# Rede
#
###############################################################################

  VPCCidr:

    Type: String

    Default: 10.0.0.0/16

    Description: Bloco CIDR da VPC.

  PublicSubnet1CIDR:

    Type: String

    Default: 10.0.1.0/24

    Description: CIDR da primeira subnet pública.

  PublicSubnet2CIDR:

    Type: String

    Default: 10.0.2.0/24

    Description: CIDR da segunda subnet pública.

###############################################################################
#
# Amazon EC2
#
###############################################################################

  InstanceType:

    Type: String

    Default: t3.micro

    AllowedValues:

      - t3.micro
      - t3.small
      - t3.medium

    Description: Tipo da instância EC2.

  KeyPairName:

    Type: AWS::EC2::KeyPair::KeyName

    Description: Nome de um Key Pair existente para acesso SSH.

###############################################################################
#
# Segurança
#
###############################################################################

  SSHLocation:

    Type: String

    Default: 0.0.0.0/0

    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"

    Description: Faixa CIDR autorizada para acesso SSH.

  EnableHTTP:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Habilita a regra HTTP (porta 80).

  EnableHTTPS:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Habilita a regra HTTPS (porta 443).

  EnableICMP:

    Type: String

    Default: "false"

    AllowedValues:

      - "true"
      - "false"

    Description: Habilita ICMP (ping).

###############################################################################
#
# Amazon S3
#
###############################################################################

  BucketName:

    Type: String

    Default: ""

    Description: >
      Nome do bucket. Quando vazio, o template gerará um nome utilizando
      ProjectName, Environment e AccountId.

  EnableVersioning:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Ativa o versionamento do bucket.

  EnableEncryption:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Ativa a criptografia padrão do bucket.

###############################################################################
#
# Monitoramento
#
###############################################################################

  EnableDetailedMonitoring:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Ativa o monitoramento detalhado da instância EC2.

###############################################################################
#
# Elastic IP
#
###############################################################################

  EnableElasticIP:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Associa um Elastic IP à instância EC2.

###############################################################################
#
# AWS Systems Manager
#
###############################################################################

  EnableSSM:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Permite gerenciamento da EC2 via AWS Systems Manager.

###############################################################################
#
# CloudWatch
#
###############################################################################

  EnableCloudWatch:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: Instala e configura o CloudWatch Agent.

###############################################################################
#
# Tags
#
###############################################################################

  CostCenter:

    Type: String

    Default: TI

    Description: Centro de custo utilizado para governança.

  Department:

    Type: String

    Default: Tecnologia

    Description: Departamento responsável pelos recursos.

  ApplicationName:

    Type: String

    Default: CloudFormationLab

    Description: Nome da aplicação.

###############################################################################
#
# Próxima seção
#
###############################################################################

Mappings: 

###############################################################################
#
# Mappings
#
###############################################################################

  AWSRegionAMI:

    us-east-1:
      AMI: ami-xxxxxxxxxxxxxxxxx

    us-east-2:
      AMI: ami-xxxxxxxxxxxxxxxxx

    us-west-2:
      AMI: ami-xxxxxxxxxxxxxxxxx

    sa-east-1:
      AMI: ami-xxxxxxxxxxxxxxxxx

    eu-west-1:
      AMI: ami-xxxxxxxxxxxxxxxxx

###############################################################################
#
# Environment Configuration
#
###############################################################################

  EnvironmentConfig:

    Development:

      InstanceType: t3.micro

      DetailedMonitoring: "false"

      BackupRetention: "7"

    Homologation:

      InstanceType: t3.small

      DetailedMonitoring: "true"

      BackupRetention: "14"

    Production:

      InstanceType: t3.medium

      DetailedMonitoring: "true"

      BackupRetention: "30"

###############################################################################
#
# S3 Configuration
#
###############################################################################

  S3Defaults:

    Default:

      Encryption: AES256

      Versioning: Enabled

      PublicAccessBlock: Enabled

###############################################################################
#
# Tag Defaults
#
###############################################################################

  TagDefaults:

    Default:

      ManagedBy: CloudFormation

      Repository: infraestrutura-automatizada-com-AWS-CloudFormation

      IaC: AWS-CloudFormation

###############################################################################
#
# Conditions
#
###############################################################################

Conditions:

###############################################################################
#
# Ambiente
#
###############################################################################

  IsDevelopment:

    !Equals
      - !Ref Environment
      - Development

  IsHomologation:

    !Equals
      - !Ref Environment
      - Homologation

  IsProduction:

    !Equals
      - !Ref Environment
      - Production

###############################################################################
#
# Recursos Opcionais
#
###############################################################################

  CreateElasticIP:

    !Equals
      - !Ref EnableElasticIP
      - "true"

  EnableVersioningCondition:

    !Equals
      - !Ref EnableVersioning
      - "true"

  EnableEncryptionCondition:

    !Equals
      - !Ref EnableEncryption
      - "true"

  EnableHTTPCondition:

    !Equals
      - !Ref EnableHTTP
      - "true"

  EnableHTTPSCondition:

    !Equals
      - !Ref EnableHTTPS
      - "true"

  EnableICMPCondition:

    !Equals
      - !Ref EnableICMP
      - "true"

  EnableCloudWatchCondition:

    !Equals
      - !Ref EnableCloudWatch
      - "true"

  EnableSSMCondition:

    !Equals
      - !Ref EnableSSM
      - "true"

  EnableDetailedMonitoringCondition:

    !Equals
      - !Ref EnableDetailedMonitoring
      - "true"

###############################################################################
#
# Bucket
#
###############################################################################

  AutoGenerateBucketName:

    !Equals
      - !Ref BucketName
      - ""

###############################################################################
#
# Rules
#
###############################################################################

Rules:

###############################################################################
#
# Regras para Ambiente
#
###############################################################################

  EnvironmentValidation:

    Assertions:

      - Assert:

          !Contains

            - - Development
              - Homologation
              - Production

            - !Ref Environment

        AssertDescription: >
          O ambiente deve ser Development,
          Homologation ou Production.

###############################################################################
#
# Regras para SSH
#
###############################################################################

  SSHValidation:

    Assertions:

      - Assert:

          !Not

            - !Equals

                - !Ref SSHLocation
                - ""

        AssertDescription: >
          Informe um bloco CIDR válido para acesso SSH.

###############################################################################
#
# Regras para Key Pair
#
###############################################################################

  KeyPairValidation:

    Assertions:

      - Assert:

          !Not

            - !Equals

                - !Ref KeyPairName
                - ""

        AssertDescription: >
          É obrigatório informar um AWS EC2 Key Pair.

###############################################################################
#
# Regras para Projeto
#
###############################################################################

  ProjectValidation:

    Assertions:

      - Assert:

          !Not

            - !Equals

                - !Ref ProjectName
                - ""

        AssertDescription: >
          O nome do projeto não pode ser vazio.

###############################################################################
#
# Boas Práticas
#
###############################################################################
#
# Este template utiliza:
#
# ✔ Mappings para desacoplar configurações por região.
# ✔ Conditions para provisionamento condicional.
# ✔ Rules para validação antes da criação da Stack.
# ✔ Configuração automática por ambiente.
# ✔ Seleção dinâmica de recursos.
# ✔ Reutilização máxima do template.
#
###############################################################################
#
# Próxima seção
#
###############################################################################

Resources: 


###############################################################################
#
# Resources
#
###############################################################################

###############################################################################
#
# Amazon VPC
#
###############################################################################

  VPC:

    Type: AWS::EC2::VPC

    Properties:

      CidrBlock: !Ref VPCCidr

      EnableDnsSupport: true

      EnableDnsHostnames: true

      InstanceTenancy: default

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-VPC"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: Owner
          Value: !Ref Owner

        - Key: Department
          Value: !Ref Department

        - Key: CostCenter
          Value: !Ref CostCenter

        - Key: Application
          Value: !Ref ApplicationName

        - Key: ManagedBy
          Value: CloudFormation

###############################################################################
#
# Internet Gateway
#
###############################################################################

  InternetGateway:

    Type: AWS::EC2::InternetGateway

    Properties:

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-IGW"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: ManagedBy
          Value: CloudFormation

###############################################################################
#
# Attach Internet Gateway
#
###############################################################################

  AttachGateway:

    Type: AWS::EC2::VPCGatewayAttachment

    Properties:

      InternetGatewayId: !Ref InternetGateway

      VpcId: !Ref VPC

###############################################################################
#
# Public Route Table
#
###############################################################################

  PublicRouteTable:

    Type: AWS::EC2::RouteTable

    Properties:

      VpcId: !Ref VPC

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-Public-RT"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

###############################################################################
#
# Default Route
#
###############################################################################

  DefaultPublicRoute:

    Type: AWS::EC2::Route

    DependsOn:

      - AttachGateway

    Properties:

      DestinationCidrBlock: 0.0.0.0/0

      GatewayId: !Ref InternetGateway

      RouteTableId: !Ref PublicRouteTable

###############################################################################
#
# DHCP Options
#
###############################################################################

  DHCPOptions:

    Type: AWS::EC2::DHCPOptions

    Properties:

      DomainName:

        !Sub "${AWS::Region}.compute.internal"

      DomainNameServers:

        - AmazonProvidedDNS

      Tags:

        - Key: Name

          Value:

            !Sub "${ProjectName}-${Environment}-DHCP"

###############################################################################
#
# Associate DHCP
#
###############################################################################

  DHCPAssociation:

    Type: AWS::EC2::VPCDHCPOptionsAssociation

    Properties:

      DhcpOptionsId: !Ref DHCPOptions

      VpcId: !Ref VPC

###############################################################################
#
# Flow Logs (Opcional)
#
###############################################################################
#
# Em ambientes corporativos recomenda-se habilitar:
#
# AWS VPC Flow Logs
#
# CloudWatch Logs
#
# Amazon S3
#
# Esta implementação será adicionada
# futuramente no Roadmap.
#
###############################################################################

###############################################################################
#
# Arquitetura da Rede
#
###############################################################################
#
#                Internet
#                    │
#          Internet Gateway
#                    │
#             Public Route Table
#                    │
#          0.0.0.0/0 → Internet
#                    │
#                  VPC
#
###############################################################################

###############################################################################
#
# Recursos Criados nesta Parte
#
# ✔ Amazon VPC
# ✔ DNS Support
# ✔ DNS Hostnames
# ✔ Internet Gateway
# ✔ Gateway Attachment
# ✔ Public Route Table
# ✔ Default Route
# ✔ DHCP Options
#
###############################################################################

###############################################################################
#
# Próxima Parte
#
# Parte 5
#
# • Public Subnet 1
# • Public Subnet 2
# • Network ACL
# • ACL Rules
# • ACL Associations
#
############################################################################### 


###############################################################################
#
# Public Subnet 1
#
###############################################################################

  PublicSubnet1:

    Type: AWS::EC2::Subnet

    Properties:

      VpcId: !Ref VPC

      CidrBlock: !Ref PublicSubnet1CIDR

      AvailabilityZone: !Select [0, !GetAZs ""]

      MapPublicIpOnLaunch: true

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-PublicSubnet1"

        - Key: Network
          Value: Public

        - Key: Environment
          Value: !Ref Environment

        - Key: Project
          Value: !Ref ProjectName

###############################################################################
#
# Public Subnet 2
#
###############################################################################

  PublicSubnet2:

    Type: AWS::EC2::Subnet

    Properties:

      VpcId: !Ref VPC

      CidrBlock: !Ref PublicSubnet2CIDR

      AvailabilityZone: !Select [1, !GetAZs ""]

      MapPublicIpOnLaunch: true

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-PublicSubnet2"

        - Key: Network
          Value: Public

        - Key: Environment
          Value: !Ref Environment

        - Key: Project
          Value: !Ref ProjectName

###############################################################################
#
# Route Table Associations
#
###############################################################################

  PublicSubnet1RouteAssociation:

    Type: AWS::EC2::SubnetRouteTableAssociation

    Properties:

      RouteTableId: !Ref PublicRouteTable

      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteAssociation:

    Type: AWS::EC2::SubnetRouteTableAssociation

    Properties:

      RouteTableId: !Ref PublicRouteTable

      SubnetId: !Ref PublicSubnet2

###############################################################################
#
# Network ACL
#
###############################################################################

  PublicNetworkAcl:

    Type: AWS::EC2::NetworkAcl

    Properties:

      VpcId: !Ref VPC

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-Public-NACL"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

###############################################################################
#
# Inbound Rules
#
###############################################################################

  InboundHTTP:

    Type: AWS::EC2::NetworkAclEntry

    Properties:

      NetworkAclId: !Ref PublicNetworkAcl

      RuleNumber: 100

      Protocol: 6

      RuleAction: allow

      Egress: false

      CidrBlock: 0.0.0.0/0

      PortRange:

        From: 80

        To: 80

  InboundHTTPS:

    Type: AWS::EC2::NetworkAclEntry

    Properties:

      NetworkAclId: !Ref PublicNetworkAcl

      RuleNumber: 110

      Protocol: 6

      RuleAction: allow

      Egress: false

      CidrBlock: 0.0.0.0/0

      PortRange:

        From: 443

        To: 443

  InboundSSH:

    Type: AWS::EC2::NetworkAclEntry

    Properties:

      NetworkAclId: !Ref PublicNetworkAcl

      RuleNumber: 120

      Protocol: 6

      RuleAction: allow

      Egress: false

      CidrBlock: !Ref SSHLocation

      PortRange:

        From: 22

        To: 22

###############################################################################
#
# Outbound Rules
#
###############################################################################

  OutboundAll:

    Type: AWS::EC2::NetworkAclEntry

    Properties:

      NetworkAclId: !Ref PublicNetworkAcl

      RuleNumber: 100

      Protocol: -1

      RuleAction: allow

      Egress: true

      CidrBlock: 0.0.0.0/0

###############################################################################
#
# Network ACL Associations
#
###############################################################################

  PublicSubnet1AclAssociation:

    Type: AWS::EC2::SubnetNetworkAclAssociation

    Properties:

      NetworkAclId: !Ref PublicNetworkAcl

      SubnetId: !Ref PublicSubnet1

  PublicSubnet2AclAssociation:

    Type: AWS::EC2::SubnetNetworkAclAssociation

    Properties:

      NetworkAclId: !Ref PublicNetworkAcl

      SubnetId: !Ref PublicSubnet2

###############################################################################
#
# Documentação
#
###############################################################################
#
# Topologia da Rede
#
#                    Internet
#                        │
#                Internet Gateway
#                        │
#                Public Route Table
#                        │
#            ┌───────────┴───────────┐
#            │                       │
#      PublicSubnet1           PublicSubnet2
#            │                       │
#            └───────────┬───────────┘
#                        │
#                 Public Network ACL
#
###############################################################################
#
# Recursos Provisionados nesta Parte
#
# ✔ Public Subnet 1
# ✔ Public Subnet 2
# ✔ Route Table Association
# ✔ Network ACL
# ✔ Regras HTTP
# ✔ Regras HTTPS
# ✔ Regra SSH
# ✔ Regra de Saída
# ✔ Associações da ACL
#
###############################################################################
#
# Boas Práticas Implementadas
#
# ✔ Distribuição em duas Availability Zones.
# ✔ Associação explícita das sub-redes à tabela de rotas.
# ✔ Separação da segurança em camadas (NACL + Security Group).
# ✔ Regras numeradas para facilitar futuras expansões.
# ✔ Estrutura preparada para evolução para sub-redes privadas.
#
###############################################################################
#
# Próxima Parte
#
# Parte 6
#
# • Security Group
# • Regras condicionais (HTTP, HTTPS e ICMP)
# • Self Reference
# • Preparação para EC2
#
############################################################################### 



###############################################################################
#
# Security Group
#
###############################################################################

  EC2SecurityGroup:

    Type: AWS::EC2::SecurityGroup

    Properties:

      GroupDescription: >
        Security Group principal do laboratório AWS CloudFormation.

      GroupName:

        !Sub "${ProjectName}-${Environment}-SG"

      VpcId: !Ref VPC

      SecurityGroupEgress:

        - IpProtocol: -1

          CidrIp: 0.0.0.0/0

          Description: Permite todo o tráfego de saída.

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-SG"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: Owner
          Value: !Ref Owner

        - Key: Department
          Value: !Ref Department

        - Key: CostCenter
          Value: !Ref CostCenter

        - Key: ManagedBy
          Value: CloudFormation

###############################################################################
#
# SSH
#
###############################################################################

  SecurityGroupSSH:

    Type: AWS::EC2::SecurityGroupIngress

    Properties:

      GroupId: !Ref EC2SecurityGroup

      IpProtocol: tcp

      FromPort: 22

      ToPort: 22

      CidrIp: !Ref SSHLocation

      Description: SSH administrativo.

###############################################################################
#
# HTTP
#
###############################################################################

  SecurityGroupHTTP:

    Type: AWS::EC2::SecurityGroupIngress

    Condition: EnableHTTPCondition

    Properties:

      GroupId: !Ref EC2SecurityGroup

      IpProtocol: tcp

      FromPort: 80

      ToPort: 80

      CidrIp: 0.0.0.0/0

      Description: HTTP público.

###############################################################################
#
# HTTPS
#
###############################################################################

  SecurityGroupHTTPS:

    Type: AWS::EC2::SecurityGroupIngress

    Condition: EnableHTTPSCondition

    Properties:

      GroupId: !Ref EC2SecurityGroup

      IpProtocol: tcp

      FromPort: 443

      ToPort: 443

      CidrIp: 0.0.0.0/0

      Description: HTTPS público.

###############################################################################
#
# ICMP (Ping)
#
###############################################################################

  SecurityGroupICMP:

    Type: AWS::EC2::SecurityGroupIngress

    Condition: EnableICMPCondition

    Properties:

      GroupId: !Ref EC2SecurityGroup

      IpProtocol: icmp

      FromPort: -1

      ToPort: -1

      CidrIp: 0.0.0.0/0

      Description: ICMP (Ping).

###############################################################################
#
# Self Reference
#
###############################################################################

  SecurityGroupSelfReference:

    Type: AWS::EC2::SecurityGroupIngress

    Properties:

      GroupId: !Ref EC2SecurityGroup

      SourceSecurityGroupId: !Ref EC2SecurityGroup

      IpProtocol: -1

      Description: Comunicação interna entre instâncias.

###############################################################################
#
# IPv6 HTTPS
#
###############################################################################

  SecurityGroupHTTPSIPv6:

    Type: AWS::EC2::SecurityGroupIngress

    Condition: EnableHTTPSCondition

    Properties:

      GroupId: !Ref EC2SecurityGroup

      IpProtocol: tcp

      FromPort: 443

      ToPort: 443

      CidrIpv6: "::/0"

      Description: HTTPS IPv6.

###############################################################################
#
# IPv6 HTTP
#
###############################################################################

  SecurityGroupHTTPIPv6:

    Type: AWS::EC2::SecurityGroupIngress

    Condition: EnableHTTPCondition

    Properties:

      GroupId: !Ref EC2SecurityGroup

      IpProtocol: tcp

      FromPort: 80

      ToPort: 80

      CidrIpv6: "::/0"

      Description: HTTP IPv6.

###############################################################################
