# Arquitetura
#
#                   IAM
#
#              IAM Role
#                   │
#           Instance Profile
#                   │
#              Amazon EC2
#                   │
#        Credenciais Temporárias
#                   │
#        Serviços AWS Autorizados
#
###############################################################################
#
# Próxima Parte
#
# Parte 8
#
# • Amazon S3
# • Bucket
# • Versionamento
# • Criptografia SSE-S3
# • Public Access Block
# • Bucket Policy
# • Lifecycle Rules
#
############################################################################### 


###############################################################################
#
# Amazon S3 Bucket
#
###############################################################################

  S3Bucket:

    Type: AWS::S3::Bucket

    Properties:

      BucketName:

        !If

          - AutoGenerateBucketName

          - !Sub "${ProjectName}-${Environment}-${AWS::AccountId}"

          - !Ref BucketName

###############################################################################
#
# Versionamento
#
###############################################################################

      VersioningConfiguration:

        Status:

          !If

            - EnableVersioningCondition

            - Enabled

            - Suspended

###############################################################################
#
# Criptografia
#
###############################################################################

      BucketEncryption:

        ServerSideEncryptionConfiguration:

          - ServerSideEncryptionByDefault:

              SSEAlgorithm: AES256

###############################################################################
#
# Public Access Block
#
###############################################################################

      PublicAccessBlockConfiguration:

        BlockPublicAcls: true

        IgnorePublicAcls: true

        BlockPublicPolicy: true

        RestrictPublicBuckets: true

###############################################################################
#
# Lifecycle Rules
#
###############################################################################

      LifecycleConfiguration:

        Rules:

          - Id: IntelligentLifecycle

            Status: Enabled

            ExpirationInDays: 365

            NoncurrentVersionExpirationInDays: 90

###############################################################################
#
# Tags
#
###############################################################################

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-Bucket"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: Owner
          Value: !Ref Owner

        - Key: Department
          Value: !Ref Department

        - Key: CostCenter
          Value: !Ref CostCenter

        - Key: ManagedBy
          Value: CloudFormation

###############################################################################
#
# Bucket Policy
#
###############################################################################

  S3BucketPolicy:

    Type: AWS::S3::BucketPolicy

    Properties:

      Bucket: !Ref S3Bucket

      PolicyDocument:

        Version: "2012-10-17"

        Statement:

###############################################################################
#
# Obrigatório HTTPS
#
###############################################################################

          - Sid: DenyInsecureTransport

            Effect: Deny

            Principal: "*"

            Action: "s3:*"

            Resource:

              - !Sub "${S3Bucket.Arn}"

              - !Sub "${S3Bucket.Arn}/*"

            Condition:

              Bool:

                aws:SecureTransport: false

###############################################################################
#
# Permite acesso da IAM Role
#
###############################################################################

          - Sid: AllowEC2Role

            Effect: Allow

            Principal:

              AWS: !GetAtt EC2IAMRole.Arn

            Action:

              - s3:GetObject

              - s3:PutObject

              - s3:ListBucket

            Resource:

              - !GetAtt S3Bucket.Arn

              - !Sub "${S3Bucket.Arn}/*"

