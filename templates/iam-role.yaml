AWSTemplateFormatVersion: '2010-09-09'

Description: >
  ============================================================================
  AWS CloudFormation - IAM Role para Amazon EC2
  ----------------------------------------------------------------------------
  Projeto......: Infraestrutura Automatizada com AWS CloudFormation
  Repositório..: infraestrutura-automatizada-com-AWS-CloudFormation
  Autor........: Sérgio Luiz dos Santos
  Objetivo.....: Provisionar uma IAM Role reutilizável para instâncias EC2,
                 eliminando o uso de credenciais locais e seguindo as boas
                 práticas de segurança da AWS.
  ============================================================================

Metadata:

  AWS::CloudFormation::Interface:

    ParameterGroups:

      - Label:
          default: "Configuração da IAM Role"

        Parameters:
          - RoleName
          - InstanceProfileName

      - Label:
          default: "Permissões"

        Parameters:
          - EnableSSM
          - EnableCloudWatch
          - EnableS3ReadOnly

      - Label:
          default: "Ambiente"

        Parameters:
          - Environment
          - ProjectName
          - Owner

    ParameterLabels:

      RoleName:
        default: "Nome da IAM Role"

      InstanceProfileName:
        default: "Nome do Instance Profile"

      EnableSSM:
        default: "Habilitar AWS Systems Manager"

      EnableCloudWatch:
        default: "Habilitar CloudWatch Agent"

      EnableS3ReadOnly:
        default: "Permitir leitura em buckets S3"

      Environment:
        default: "Ambiente"

      ProjectName:
        default: "Projeto"

      Owner:
        default: "Responsável"

  Project:

    Name: Infraestrutura Automatizada com AWS CloudFormation

    Repository: infraestrutura-automatizada-com-AWS-CloudFormation

    Template: templates/iam-role.yaml

    IaC: AWS CloudFormation

    Version: "1.0"

    LastUpdate: "2026"

Parameters:

###############################################################################
#
# IAM
#
###############################################################################

  RoleName:

    Type: String

    Default: CloudFormationEC2Role

    Description: >
      Nome da IAM Role que será associada às instâncias EC2.

    AllowedPattern: "^[a-zA-Z0-9+=,.@_-]{1,64}$"

  InstanceProfileName:

    Type: String

    Default: CloudFormationEC2Profile

    Description: >
      Nome do IAM Instance Profile.

    AllowedPattern: "^[a-zA-Z0-9+=,.@_-]{1,64}$"

###############################################################################
#
# Recursos opcionais
#
###############################################################################

  EnableSSM:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: >
      Anexa a política AmazonSSMManagedInstanceCore.

  EnableCloudWatch:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: >
      Anexa permissões para utilização do CloudWatch Agent.

  EnableS3ReadOnly:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

    Description: >
      Permite acesso somente leitura aos buckets Amazon S3.

###############################################################################
#
# Ambiente
#
###############################################################################

  Environment:

    Type: String

    Default: Development

    AllowedValues:

      - Development
      - Homologation
      - Production

  ProjectName:

    Type: String

    Default: AWS-CloudFormation-Lab

  Owner:

    Type: String

    Default: Sergio Santos

###############################################################################
#
# Conditions
#
###############################################################################

Conditions:

  CreateSSMPolicy: !Equals

    - !Ref EnableSSM

    - "true"

  CreateCloudWatchPolicy: !Equals

    - !Ref EnableCloudWatch

    - "true"

  CreateS3ReadOnlyPolicy: !Equals

    - !Ref EnableS3ReadOnly

    - "true"

  IsProduction: !Equals

    - !Ref Environment

    - Production

  IsDevelopment: !Equals

    - !Ref Environment

    - Development 

###############################################################################
#
# Resources
#
###############################################################################

Resources:

###############################################################################
#
# IAM Role
#
# Role assumida por instâncias Amazon EC2.
#
###############################################################################

  EC2IAMRole:

    Type: AWS::IAM::Role

    Properties:

      RoleName: !Ref RoleName

      Description: >
        IAM Role utilizada por instâncias Amazon EC2 para acesso seguro aos
        serviços AWS sem utilização de Access Keys.

      Path: /

      MaxSessionDuration: 43200

###############################################################################
#
# Trust Relationship
#
###############################################################################

      AssumeRolePolicyDocument:

        Version: "2012-10-17"

        Statement:

          - Sid: EC2TrustRelationship

            Effect: Allow

            Principal:

              Service:

                - ec2.amazonaws.com

            Action:

              - sts:AssumeRole

###############################################################################
#
# AWS Managed Policies
#
###############################################################################

      ManagedPolicyArns:

        #######################################################################
        # AWS Systems Manager
        #######################################################################

        - !If

          - CreateSSMPolicy

          - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

          - !Ref AWS::NoValue

        #######################################################################
        # CloudWatch Agent
        #######################################################################

        - !If

          - CreateCloudWatchPolicy

          - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

          - !Ref AWS::NoValue

        #######################################################################
        # Amazon S3 Read Only
        #######################################################################

        - !If

          - CreateS3ReadOnlyPolicy

          - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

          - !Ref AWS::NoValue

###############################################################################
#
# Tags
#
###############################################################################

      Tags:

        - Key: Name
          Value: !Ref RoleName

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: Owner
          Value: !Ref Owner

        - Key: ManagedBy
          Value: CloudFormation

        - Key: Repository
          Value: infraestrutura-automatizada-com-AWS-CloudFormation

        - Key: IaC
          Value: AWS CloudFormation

        - Key: Purpose
          Value: EC2 Identity

        - Key: Security
          Value: LeastPrivilege

        - Key: CostCenter
          Value: Cloud-Studies

        - Key: Version
          Value: "1.0" 


###############################################################################
#
# Customer Managed Policy
#
# Política personalizada contendo permissões mínimas necessárias para
# workloads executadas na EC2.
#
###############################################################################

  EC2CustomPolicy:

    Type: AWS::IAM::ManagedPolicy

    Properties:

      ManagedPolicyName: !Sub "${ProjectName}-EC2-CustomPolicy"

      Description: >
        Política personalizada utilizada pelas instâncias EC2 deste projeto.

      PolicyDocument:

        Version: "2012-10-17"

        Statement:

###############################################################################
#
# CloudFormation ReadOnly
#
###############################################################################

          - Sid: CloudFormationRead

            Effect: Allow

            Action:

              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources

            Resource: "*"

###############################################################################
#
# EC2 ReadOnly
#
###############################################################################

          - Sid: EC2Read

            Effect: Allow

            Action:

              - ec2:DescribeInstances
              - ec2:DescribeVolumes
              - ec2:DescribeTags
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups

            Resource: "*"

###############################################################################
#
# CloudWatch Metrics
#
###############################################################################

          - Sid: CloudWatchMetrics

            Effect: Allow

            Action:

              - cloudwatch:PutMetricData

            Resource: "*"

###############################################################################
#
# Systems Manager Parameter Store
#
###############################################################################

          - Sid: ParameterStoreRead

            Effect: Allow

            Action:

              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:GetParametersByPath

            Resource: "*"

###############################################################################
#
# Logs
#
###############################################################################

          - Sid: CloudWatchLogs

            Effect: Allow

            Action:

              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams

            Resource: "*"

      Roles:

        - !Ref EC2IAMRole

###############################################################################
#
# Instance Profile
#
###############################################################################

  EC2InstanceProfile:

    Type: AWS::IAM::InstanceProfile

    Properties:

      InstanceProfileName: !Ref InstanceProfileName

      Path: /

      Roles:

        - !Ref EC2IAMRole

###############################################################################
#
# Tags (Instance Profile)
#
###############################################################################
#
# O recurso AWS::IAM::InstanceProfile não suporta Tags.
#
# A governança é realizada através da IAM Role correspondente.
#
############################################################################### 





        ###############################################################################
#
# Outputs
#
# Os recursos exportados podem ser reutilizados por outras stacks utilizando
# Fn::ImportValue.
#
###############################################################################

Outputs:

###############################################################################
#
# IAM Role
#
###############################################################################

  IAMRoleName:

    Description: Nome da IAM Role criada.

    Value: !Ref EC2IAMRole

    Export:

      Name: !Sub "${AWS::StackName}-RoleName"

  IAMRoleArn:

    Description: ARN da IAM Role.

    Value: !GetAtt EC2IAMRole.Arn

    Export:

      Name: !Sub "${AWS::StackName}-RoleArn"

###############################################################################
#
# Instance Profile
#
###############################################################################

  InstanceProfileName:

    Description: Nome do Instance Profile.

    Value: !Ref EC2InstanceProfile

    Export:

      Name: !Sub "${AWS::StackName}-InstanceProfile"

  InstanceProfileArn:

    Description: ARN do Instance Profile.

    Value: !GetAtt EC2InstanceProfile.Arn

    Export:

      Name: !Sub "${AWS::StackName}-InstanceProfileArn"

###############################################################################
#
# Managed Policy
#
###############################################################################

  CustomManagedPolicyArn:

    Description: ARN da Customer Managed Policy.

    Value: !Ref EC2CustomPolicy

    Export:

      Name: !Sub "${AWS::StackName}-CustomPolicyArn"

###############################################################################
#
# Ambiente
#
###############################################################################

  EnvironmentName:

    Description: Ambiente utilizado.

    Value: !Ref Environment

###############################################################################
#
# Projeto
#
###############################################################################

  Project:

    Description: Nome do projeto.

    Value: !Ref ProjectName

###############################################################################
#
# Stack
#
###############################################################################

  StackName:

    Description: Nome da Stack.

    Value: !Ref AWS::StackName

  StackId:

    Description: Identificador único da Stack.

    Value: !Ref AWS::StackId

  AWSRegion:

    Description: Região AWS utilizada.

    Value: !Ref AWS::Region

  AWSAccount:

    Description: Conta AWS responsável pela implantação.

    Value: !Ref AWS::AccountId

###############################################################################
#
# Template Summary
#
###############################################################################
#
# Recursos Provisionados
#
# ✔ IAM Role
#
# ✔ IAM Instance Profile
#
# ✔ Customer Managed Policy
#
# ✔ AWS Managed Policies condicionais
#
# ✔ Trust Relationship para Amazon EC2
#
# ✔ Outputs reutilizáveis
#
# ✔ Cross-Stack Exports
#
###############################################################################
#
# Arquitetura
#
#                Amazon EC2
#                     │
#                     │ AssumeRole
#                     ▼
#               IAM Instance Profile
#                     │
#                     ▼
#                  IAM Role
#                     │
#      ┌──────────────┼────────────────┐
#      │              │                │
#      ▼              ▼                ▼
#   Systems      CloudWatch       Amazon S3
#   Manager         Logs           ReadOnly
#                     │
#                     ▼
#          Customer Managed Policy
#
###############################################################################
#
# Boas Práticas Implementadas
#
# ✔ IAM Roles em vez de Access Keys
#
# ✔ Credenciais temporárias (AWS STS)
#
# ✔ Princípio do Menor Privilégio
#
# ✔ Políticas reutilizáveis
#
# ✔ Governança através de Tags
#
# ✔ Cross-Stack References
#
# ✔ Infrastructure as Code
#
# ✔ Templates modulares
#
# ✔ Compatível com AWS CLI
#
# ✔ Compatível com CloudFormation
#
# ✔ Compatível com cfn-lint
#
###############################################################################
#
# Próximas Evoluções
#
# • IAM Permission Boundary
#
# • IAM Permissions por ambiente
#
# • IAM Policy Conditions
#
# • KMS para criptografia
#
# • Secrets Manager
#
# • Parameter Store SecureString
#
# • AWS Config Rules
#
# • IAM Access Analyzer
#
# • CloudTrail
#
# • SCP (AWS Organizations)
#
###############################################################################
#
# Integração com templates do projeto
#
# templates/vpc.yaml
#     │
#     ▼
# templates/iam-role.yaml
#     │
#     ▼
# templates/ec2.yaml
#     │
#     ▼
# templates/s3-bucket.yaml
#
# O ec2.yaml poderá consumir o Instance Profile utilizando:
#
# Fn::ImportValue:
#   !Sub "${IAMStackName}-InstanceProfile"
#
###############################################################################
#
# Objetivos do Projeto
#
# • Eliminar credenciais estáticas em instâncias EC2.
#
# • Demonstrar autenticação baseada em IAM Roles.
#
# • Aplicar o princípio do menor privilégio.
#
# • Construir templates reutilizáveis.
#
# • Facilitar auditoria e governança.
#
# • Demonstrar boas práticas de Infrastructure as Code.
#
###############################################################################
#
# Fim do Template
#
###############################################################################  



