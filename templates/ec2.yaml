AWSTemplateFormatVersion: '2010-09-09'

Description: >
  ============================================================================
  AWS CloudFormation - Amazon EC2
  ----------------------------------------------------------------------------
  Projeto......: Infraestrutura Automatizada com AWS CloudFormation
  Repositório..: infraestrutura-automatizada-com-AWS-CloudFormation
  Autor........: Sérgio Luiz dos Santos
  Objetivo.....: Provisionar uma instância Amazon EC2 reutilizando a
                 infraestrutura de rede criada pelo template vpc.yaml,
                 seguindo boas práticas de Infrastructure as Code (IaC),
                 segurança, governança e automação.
  ============================================================================

Metadata:

  AWS::CloudFormation::Interface:

    ParameterGroups:

      - Label:
          default: "Configuração da Instância"

        Parameters:
          - InstanceName
          - InstanceType
          - KeyPairName

      - Label:
          default: "Armazenamento"

        Parameters:
          - VolumeSize
          - VolumeType

      - Label:
          default: "Infraestrutura"

        Parameters:
          - NetworkStackName

      - Label:
          default: "Ambiente"

        Parameters:
          - Environment
          - ProjectName
          - Owner

    ParameterLabels:

      InstanceName:
        default: "Nome da Instância"

      InstanceType:
        default: "Tipo da Instância"

      KeyPairName:
        default: "Key Pair"

      VolumeSize:
        default: "Tamanho do Disco (GB)"

      VolumeType:
        default: "Tipo do Volume"

      NetworkStackName:
        default: "Nome da Stack de Rede"

      Environment:
        default: "Ambiente"

      ProjectName:
        default: "Projeto"

      Owner:
        default: "Responsável"

  Project:

    Name: Infraestrutura Automatizada com AWS CloudFormation

    Repository: infraestrutura-automatizada-com-AWS-CloudFormation

    Template: templates/ec2.yaml

    IaC: AWS CloudFormation

    Version: "1.0"

    LastUpdate: "2026"

Parameters:

###############################################################################
#
# Infraestrutura
#
###############################################################################

  NetworkStackName:

    Type: String

    Description: >
      Nome da Stack responsável pela infraestrutura de rede (vpc.yaml).

###############################################################################
#
# EC2
#
###############################################################################

  InstanceName:

    Type: String

    Default: CloudFormation-EC2

    Description: Nome lógico da instância.

  InstanceType:

    Type: String

    Default: t3.micro

    AllowedValues:

      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large

    Description: Tipo da instância Amazon EC2.

  KeyPairName:

    Type: AWS::EC2::KeyPair::KeyName

    Description: >
      Nome do AWS Key Pair utilizado para acesso SSH.

###############################################################################
#
# Storage
#
###############################################################################

  VolumeSize:

    Type: Number

    Default: 20

    MinValue: 8

    MaxValue: 200

    Description: >
      Tamanho do volume EBS em GB.

  VolumeType:

    Type: String

    Default: gp3

    AllowedValues:

      - gp3
      - gp2

###############################################################################
#
# Ambiente
#
###############################################################################

  Environment:

    Type: String

    Default: Development

    AllowedValues:

      - Development
      - Homologation
      - Production

  ProjectName:

    Type: String

    Default: AWS-CloudFormation-Lab

  Owner:

    Type: String

    Default: Sergio Santos

###############################################################################
#
# AMI
#
# Utiliza o Parameter Store para sempre obter a versão estável mais recente
# do Amazon Linux, evitando AMIs fixas no template.
#
###############################################################################

  LatestAmiId:

    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>

    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

###############################################################################
#
# Elastic IP
#
###############################################################################

  AllocateElasticIP:

    Type: String

    Default: "false"

    AllowedValues:

      - "true"
      - "false"

###############################################################################
#
# Conditions
#
###############################################################################

Conditions:

  CreateElasticIP: !Equals

    - !Ref AllocateElasticIP

    - "true"

  IsProduction: !Equals

    - !Ref Environment

    - Production

  IsDevelopment: !Equals

    - !Ref Environment

    - Development 




###############################################################################
#
# Security Group
#
# Firewall Stateful responsável por controlar o tráfego da instância EC2.
# O acesso SSH é parametrizado para seguir o princípio do menor privilégio.
#
###############################################################################

Resources:

  #############################################################
  # Security Group
  #############################################################

  EC2SecurityGroup:

    Type: AWS::EC2::SecurityGroup

    Properties:

      GroupDescription: >
        Security Group utilizado pela instância EC2 criada por este template.

      GroupName: !Sub "${ProjectName}-EC2-SG"

      VpcId:

        Fn::ImportValue:

          !Sub "${NetworkStackName}-VPCId"

      SecurityGroupIngress:

        #######################################################
        # SSH
        #######################################################

        - Description: SSH

          IpProtocol: tcp

          FromPort: 22

          ToPort: 22

          CidrIp: !Ref AllowedSSHCidr

        #######################################################
        # HTTP
        #######################################################

        - Description: HTTP

          IpProtocol: tcp

          FromPort: 80

          ToPort: 80

          CidrIp: 0.0.0.0/0

        #######################################################
        # HTTPS
        #######################################################

        - Description: HTTPS

          IpProtocol: tcp

          FromPort: 443

          ToPort: 443

          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:

        #######################################################
        # Saída para Internet
        #######################################################

        - Description: Allow All Outbound

          IpProtocol: -1

          CidrIp: 0.0.0.0/0

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-EC2-SG"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: Owner
          Value: !Ref Owner

        - Key: ManagedBy
          Value: CloudFormation

        - Key: Repository
          Value: infraestrutura-automatizada-com-AWS-CloudFormation

        - Key: IaC
          Value: AWS CloudFormation

        - Key: Purpose
          Value: EC2 Security

        - Key: CostCenter
          Value: Cloud-Studies

        - Key: Version
          Value: "1.0" 


###############################################################################
#
# Amazon EC2 Instance
#
###############################################################################

  EC2Instance:

    Type: AWS::EC2::Instance

    Properties:

      InstanceType: !Ref InstanceType

      ImageId: !Ref LatestAmiId

      KeyName: !Ref KeyPairName

      SubnetId:

        Fn::ImportValue:

          !Sub "${NetworkStackName}-PublicSubnet01"

      SecurityGroupIds:

        - !Ref EC2SecurityGroup

      BlockDeviceMappings:

        - DeviceName: /dev/xvda

          Ebs:

            VolumeType: !Ref VolumeType

            VolumeSize: !Ref VolumeSize

            DeleteOnTermination: true

            Encrypted: true

      MetadataOptions:

        HttpEndpoint: enabled

        HttpTokens: required

        HttpPutResponseHopLimit: 2

      Monitoring: true

      UserData:

        Fn::Base64: !Sub |

          #!/bin/bash

          dnf update -y

          dnf install -y httpd git wget unzip

          systemctl enable httpd

          systemctl start httpd

          TOKEN=$(curl -X PUT \
          "http://169.254.169.254/latest/api/token" \
          -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")

          INSTANCE_ID=$(curl -H \
          "X-aws-ec2-metadata-token: $TOKEN" \
          http://169.254.169.254/latest/meta-data/instance-id)

          AZ=$(curl -H \
          "X-aws-ec2-metadata-token: $TOKEN" \
          http://169.254.169.254/latest/meta-data/placement/availability-zone)

          cat > /var/www/html/index.html << EOF

          <!DOCTYPE html>

          <html>

          <head>

          <title>AWS CloudFormation Lab</title>

          <style>

          body {

              font-family: Arial;

              background:#232F3E;

              color:white;

              text-align:center;

              margin-top:60px;

          }

          h1{

              color:#FF9900;

          }

          </style>

          </head>

          <body>

          <h1>Infraestrutura Automatizada com AWS CloudFormation</h1>

          <h2>Servidor provisionado automaticamente</h2>

          <p><b>Projeto:</b> ${ProjectName}</p>

          <p><b>Ambiente:</b> ${Environment}</p>

          <p><b>Instância:</b> $INSTANCE_ID</p>

          <p><b>Availability Zone:</b> $AZ</p>

          </body>

          </html>

          EOF

      Tags:

        - Key: Name
          Value: !Ref InstanceName

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: Owner
          Value: !Ref Owner

        - Key: ManagedBy
          Value: CloudFormation

        - Key: Repository
          Value: infraestrutura-automatizada-com-AWS-CloudFormation

        - Key: IaC
          Value: AWS CloudFormation

        - Key: Purpose
          Value: Compute

        - Key: CostCenter
          Value: Cloud-Studies

###############################################################################
#
# Elastic IP
#
###############################################################################

  ElasticIPAddress:

    Type: AWS::EC2::EIP

    Condition: CreateElasticIP

    Properties:

      Domain: vpc

      Tags:

        - Key: Name
          Value: !Sub "${ProjectName}-ElasticIP"

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

###############################################################################
#
# Elastic IP Association
#
###############################################################################

  ElasticIPAssociation:

    Type: AWS::EC2::EIPAssociation

    Condition: CreateElasticIP

    Properties:

      AllocationId: !GetAtt ElasticIPAddress.AllocationId

      InstanceId: !Ref EC2Instance 


###############################################################################
#
# Outputs
#
# Os recursos exportados podem ser reutilizados por outras stacks utilizando
# Fn::ImportValue, promovendo modularidade e reutilização da infraestrutura.
#
###############################################################################

Outputs:

###############################################################################
#
# EC2 Instance
#
###############################################################################

  InstanceId:

    Description: Identificador da instância EC2.

    Value: !Ref EC2Instance

    Export:

      Name: !Sub "${AWS::StackName}-InstanceId"

  InstancePublicIp:

    Description: Endereço IP público da instância.

    Value: !GetAtt EC2Instance.PublicIp

    Export:

      Name: !Sub "${AWS::StackName}-PublicIP"

  InstancePrivateIp:

    Description: Endereço IP privado da instância.

    Value: !GetAtt EC2Instance.PrivateIp

    Export:

      Name: !Sub "${AWS::StackName}-PrivateIP"

  InstanceAvailabilityZone:

    Description: Availability Zone da instância.

    Value: !GetAtt EC2Instance.AvailabilityZone

###############################################################################
#
# Security Group
#
###############################################################################

  SecurityGroupId:

    Description: Security Group utilizado pela instância.

    Value: !Ref EC2SecurityGroup

    Export:

      Name: !Sub "${AWS::StackName}-SecurityGroup"

###############################################################################
#
# Elastic IP
#
###############################################################################

  ElasticIPAddress:

    Condition: CreateElasticIP

    Description: Elastic IP associado à instância.

    Value: !Ref ElasticIPAddress

    Export:

      Name: !Sub "${AWS::StackName}-ElasticIP"

###############################################################################
#
# Ambiente
#
###############################################################################

  EnvironmentName:

    Description: Ambiente utilizado.

    Value: !Ref Environment

###############################################################################
#
# Projeto
#
###############################################################################

  Project:

    Description: Nome do projeto.

    Value: !Ref ProjectName

###############################################################################
#
# Stack
#
###############################################################################

  StackName:

    Description: Nome da Stack.

    Value: !Ref AWS::StackName

  StackId:

    Description: Identificador único da Stack.

    Value: !Ref AWS::StackId

  AWSRegion:

    Description: Região AWS utilizada.

    Value: !Ref AWS::Region

  AWSAccount:

    Description: Conta AWS responsável pela implantação.

    Value: !Ref AWS::AccountId

###############################################################################
