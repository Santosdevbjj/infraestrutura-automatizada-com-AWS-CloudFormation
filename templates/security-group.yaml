AWSTemplateFormatVersion: '2010-09-09'

Description: >
  ============================================================================
  AWS CloudFormation - Security Group Reutilizável
  ----------------------------------------------------------------------------
  Projeto......: Infraestrutura Automatizada com AWS CloudFormation
  Repositório..: infraestrutura-automatizada-com-AWS-CloudFormation
  Autor........: Sérgio Luiz dos Santos
  Objetivo.....: Provisionar um Amazon EC2 Security Group reutilizável,
                 desacoplado da camada de computação, seguindo as boas
                 práticas de segurança, governança e Infrastructure as Code.
  ============================================================================

Metadata:

  AWS::CloudFormation::Interface:

    ParameterGroups:

      - Label:
          default: "Configuração do Security Group"

        Parameters:

          - SecurityGroupName
          - SecurityGroupDescription

      - Label:
          default: "Integração com Rede"

        Parameters:

          - NetworkStackName

      - Label:
          default: "Regras de Entrada"

        Parameters:

          - SSHLocation
          - EnableHTTP
          - EnableHTTPS
          - EnableICMP

      - Label:
          default: "Ambiente"

        Parameters:

          - Environment
          - ProjectName
          - Owner

    ParameterLabels:

      SecurityGroupName:
        default: "Nome do Security Group"

      SecurityGroupDescription:
        default: "Descrição"

      NetworkStackName:
        default: "Stack da VPC"

      SSHLocation:
        default: "CIDR permitido para SSH"

      EnableHTTP:
        default: "Habilitar HTTP"

      EnableHTTPS:
        default: "Habilitar HTTPS"

      EnableICMP:
        default: "Habilitar ICMP"

      Environment:
        default: "Ambiente"

      ProjectName:
        default: "Projeto"

      Owner:
        default: "Responsável"

  Project:

    Name: Infraestrutura Automatizada com AWS CloudFormation

    Repository: infraestrutura-automatizada-com-AWS-CloudFormation

    Template: templates/security-group.yaml

    IaC: AWS CloudFormation

    Version: "1.0"

    LastUpdate: "2026"

###############################################################################
#
# Parameters
#
###############################################################################

Parameters:

###############################################################################
#
# Security Group
#
###############################################################################

  SecurityGroupName:

    Type: String

    Default: CloudFormationSecurityGroup

    Description: >
      Nome do Security Group.

    AllowedPattern: "^[a-zA-Z0-9+=,.@_-]{1,255}$"

  SecurityGroupDescription:

    Type: String

    Default: Security Group para instâncias EC2

    Description: >
      Descrição do Security Group.

###############################################################################
#
# Rede
#
###############################################################################

  NetworkStackName:

    Type: String

    Default: network-stack

    Description: >
      Nome da Stack responsável pela VPC. Utilizado para importar
      o VpcId através de Cross-Stack References.

###############################################################################
#
# Regras
#
###############################################################################

  SSHLocation:

    Type: String

    Default: 0.0.0.0/0

    Description: >
      Faixa CIDR autorizada para conexão SSH.

    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"

  EnableHTTP:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

  EnableHTTPS:

    Type: String

    Default: "true"

    AllowedValues:

      - "true"
      - "false"

  EnableICMP:

    Type: String

    Default: "false"

    AllowedValues:

      - "true"
      - "false"

###############################################################################
#
# Ambiente
#
###############################################################################

  Environment:

    Type: String

    Default: Development

    AllowedValues:

      - Development
      - Homologation
      - Production

  ProjectName:

    Type: String

    Default: AWS-CloudFormation-Lab

  Owner:

    Type: String

    Default: Sergio Santos

###############################################################################
#
# Conditions
#
###############################################################################

Conditions:

###############################################################################
#
# Protocolos
#
###############################################################################

  CreateHTTPRule:

    !Equals

      - !Ref EnableHTTP

      - "true"

  CreateHTTPSRule:

    !Equals

      - !Ref EnableHTTPS

      - "true"

  CreateICMPRule:

    !Equals

      - !Ref EnableICMP

      - "true"

###############################################################################
#
# Ambiente
#
###############################################################################

  IsProduction:

    !Equals

      - !Ref Environment

      - Production

  IsDevelopment:

    !Equals

      - !Ref Environment

      - Development

###############################################################################
#
# Resources
#
###############################################################################


###############################################################################
#
# Amazon EC2 Security Group
#
###############################################################################

  EC2SecurityGroup:

    Type: AWS::EC2::SecurityGroup

    Properties:

      GroupName: !Ref SecurityGroupName

      GroupDescription: !Ref SecurityGroupDescription

      VpcId:

        Fn::ImportValue:

          !Sub "${NetworkStackName}-VpcId"

      SecurityGroupIngress:

###############################################################################
#
# SSH
#
###############################################################################

        - IpProtocol: tcp

          FromPort: 22

          ToPort: 22

          CidrIp: !Ref SSHLocation

          Description: SSH Administration

###############################################################################
#
# HTTP
#
###############################################################################

        - !If

          - CreateHTTPRule

          - IpProtocol: tcp

            FromPort: 80

            ToPort: 80

            CidrIp: 0.0.0.0/0

            Description: HTTP

          - !Ref AWS::NoValue

###############################################################################
#
# HTTPS
#
###############################################################################

        - !If

          - CreateHTTPSRule

          - IpProtocol: tcp

            FromPort: 443

            ToPort: 443

            CidrIp: 0.0.0.0/0

            Description: HTTPS

          - !Ref AWS::NoValue

###############################################################################
#
# ICMP (Opcional)
#
###############################################################################

        - !If

          - CreateICMPRule

          - IpProtocol: icmp

            FromPort: -1

            ToPort: -1

            CidrIp: 0.0.0.0/0

            Description: ICMP Ping

          - !Ref AWS::NoValue

###############################################################################
#
# Egress
#
###############################################################################

      SecurityGroupEgress:

        - IpProtocol: -1

          CidrIp: 0.0.0.0/0

          Description: Allow all outbound traffic

###############################################################################
#
# Tags
#
###############################################################################

      Tags:

        - Key: Name
          Value: !Ref SecurityGroupName

        - Key: Project
          Value: !Ref ProjectName

        - Key: Environment
          Value: !Ref Environment

        - Key: Owner
          Value: !Ref Owner

        - Key: ManagedBy
          Value: CloudFormation

        - Key: Repository
          Value: infraestrutura-automatizada-com-AWS-CloudFormation

        - Key: IaC
          Value: AWS CloudFormation

        - Key: Purpose
          Value: Network Security

        - Key: Security
          Value: LeastPrivilege

        - Key: CostCenter
          Value: Cloud-Studies

        - Key: Version
          Value: "1.0" 



          
